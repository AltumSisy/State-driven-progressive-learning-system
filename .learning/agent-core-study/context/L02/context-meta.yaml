concepts:
  - id: "#1_AgentState_three_blocks"
    name: "AgentState 三块记忆法"
    level: "L2"
    description: "配置(systemPrompt/model/thinkingLevel) + 对话内容(tools/messages) + 运行状态(4个只读)"

  - id: "#2_AgentState_shallow_copy"
    name: "浅拷贝设计意图"
    level: "L2"
    description: "精准防御：只防御数组替换，允许共享对象变更。外部修改工具属性→Agent同步感知；外部push→Agent不受影响"

  - id: "#3_AgentState_readonly_props"
    name: "只读属性框架维护时机"
    level: "L2"
    description: "isStreaming(LLM调用开始→true，agent_end监听器完成→false)，pendingToolCalls(工具开始→add，结束→remove)"

  - id: "#4_AgentTool_five_elements"
    name: "AgentTool 五要素法"
    level: "L2"
    description: "继承Tool(name/description/parameters) + 新增(label/prepareArguments/execute/executionMode)"

  - id: "#5_AgentTool_execute_params"
    name: "execute 四参数详解"
    level: "L2"
    description: "toolCallId(事件关联) + params(验证后类型安全) + signal(取消) + onUpdate(进度回调)"

  - id: "#6_AgentTool_generic_params"
    name: "泛型参数化含义"
    level: "L2"
    description: "TParameters extends TSchema(参数必须能被JSON Schema描述) = TSchema(默认) + TDetails = any(详情类型)"

  - id: "#7_AgentTool_prepareArguments_vs_schema"
    name: "prepareArguments vs schema验证"
    level: "L2"
    description: "prepareArguments是兼容性shim(阶段1，容错预处理) → TypeBox schema是正式验证(阶段2)"

  - id: "#8_AgentLoopConfig_eight_hooks"
    name: "八大钩子记忆法"
    level: "L2"
    description: "翻译官(convertToLlm) + 整理官(transformContext) + 钥匙官(getApiKey) + 拦截官(beforeToolCall) + 修改官(afterToolCall) + 刹车官(shouldStopAfterTurn) + 调参官(prepareNextTurn) + 方向盘(getSteeringMessages) + 加餐官(getFollowUpMessages)"

  - id: "#9_AgentLoopConfig_afterToolCallResult"
    name: "afterToolCallResult 字段级替换"
    level: "L2"
    description: "返回字段完全替换原字段，无深度合并。需手动展开: { ...result.details, audited: true }"

  - id: "#10_ToolExecutionMode_parallel_flow"
    name: "parallel 执行三阶段"
    level: "L2"
    description: "预检阶段(顺序: prepareArguments→schema验证→beforeToolCall) → 执行阶段(并发: execute) → 结果阶段(tool_execution_end按完成顺序，ToolResult消息按原序)"

  - id: "#11_ThinkingLevel_xhigh_limitation"
    name: "xhigh 限制"
    level: "L2"
    description: "仅部分模型支持extended thinking，需检查model.metadata，否则可能忽略或报错"

  - id: "#12_three_concepts_relation"
    name: "三者关系"
    level: "L2"
    description: "State=这一刻的'是什么'，Tool=技能卡(放在State.tools数组)，LoopConfig=工作流程规则书(创建时传入)"

source_files:
  - path: "pi/agent/src/types.ts"
    lines: "55-81, 135-277, 284, 317-418"

key_takeaways:
  - "AgentState: 三块记忆(配置/对话/运行) + 浅拷贝精准防御"
  - "AgentTool: 五要素 + 泛型参数化 + prepareArguments是shim不是验证器"
  - "AgentLoopConfig: 八大钩子(翻译官/整理官/钥匙官/拦截官/修改官/刹车官/调参官/方向盘/加餐官)"
  - "afterToolCallResult: 字段级替换，手动展开合并"
  - "parallel: 预检顺序 → 执行并发 → 结果原序"

common_errors:
  - "遗漏 parameters → 使用 Type.Object({})"
  - "prepareArguments 当验证器 → 实际是兼容性 shim"
  - "afterToolCall 深度合并期望 → 手动 { ...result.details, new }"
  - "xhigh 不检查模型 → 检查 model.metadata"
  - "直接 push 到 tools/messages → 推荐整体替换"
  - "钩子函数抛异常 → 必须安全返回 fallback"

memory_hooks:
  - "配置、对话、运行中，三块记住不头痛"
  - "名标预执模，干活传四宝（ID、参数、信号、回调）"
  - "翻译官、整理官、钥匙官、拦截官、修改官、刹车官、调参官、方向盘、加餐官"

